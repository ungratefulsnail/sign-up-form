<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up Form</title>
    <link rel="stylesheet" href="styles.css">
    <source src="script.js">
</head>
<body>
    <div class="branding-panel">
        <div class="logo-panel">
            <img class="logo-img" src="images/odin-lined.png" alt="A norse head logo">
            <h1 class="logo-text">ODIN</h1>
        </div>
    </div>
        

    <div class="signup-panel">
        <div class="intro-section">
            <p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams.
                <br>Sign up <em>now</em> to get started.
            </p><br>
            <p>You <em>know</em> you want to.</p>
        </div>
        <div class="form-section">
            <p class="form-text">Let's do this!</p>
            <form id="signup-form" action="https://httpbin.org/post" method="post">
                <div class="form-group">
                    <label for="first_name">FIRST NAME</label>
                    <input type="text" id="first_name" name="first_name">
                </div>
                <div class="form-group">
                    <label for="last_name">LAST NAME</label>
                    <input type="text" id="last_name" name="last_name">
                </div>
                <div class="form-group">
                    <label for="user_email">EMAIL</label>
                    <input type="email" id="user_email" name="email">
                </div>
                <div class="form-group">
                    <label for="user_phone">PHONE NUMBER</label>
                    <input type="tel" id="user_phone" name="phone">
                </div>
                <div class="form-group">
                    <label for="user_password">PASSWORD</label>
                    <input type="password" id="user_password" name="password" minlength="8" required>
                </div>
                <div class="form-group">
                    <label for="user_password">CONFIRM PASSWORD</label>
                    <input type="password" id="user_password" name="password" minlength="8" required>
                </div>
            </form>
        </div>
        <div class="button-section">
            <button type="submit" form="signup-form">Create Account</button>
            <p>Already have an account? <a href="/index.html">Log in</a></p>
        </div>
    </div>
</body>
</html>
