<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up Form</title>
    <link rel="stylesheet" href="styles.css">
    <source src="script.js">
</head>
<body>
    <div class="branding-panel">
        <div class="logo-section"></div>
        <div class="background-section">
            <img src="images/halie-west-25xggax4bSA-unsplash.jpg" alt="Background image of a leaf">
        </div>
    </div>

    <div class="signup-panel">
        <div class="intro-section">
            <p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams.
                <br>Sign up <em>now</em> to get started.
            </p>
            <p>You <em>know</em> you want to.</p>
        </div>
        <div class="form-section">
            <p>Let's do this!</p>
            <form action="https://httpbin.org/post" method="post">
                <label for="first_name">FIRST NAME</label>
                <input type="text" id="first_name" name="first_name">

                <label for="last_name">LAST NAME</label>
                <input type="text" id="last_name" name="last_name">

                <label for="user_email">EMAIL</label>
                <input type="email" id="user_email" name="email">

                <label for="user_phone">PHONE NUMBER</label>
                <input type="tel" id="user_phone" name="phone">

                <label for="user_password">PASSWORD</label>
                <input type="password" id="user_password" name="password">

                <label for="user_password">CONFIRM PASSWORD</label>
                <input type="password" id="user_password" name="password">

                <button type="submit">Create Account</button>
            </form>
            <p>Already have an account? Log in</p>
        </div>
    </div>
</body>
</html>
